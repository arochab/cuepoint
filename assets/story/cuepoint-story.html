<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CuePoint — Story</title>
<!--
  CuePoint Instagram Story renderer (9:16, 1080x1920).
  The real "Cue" liquid-glass droplet, ported from src/lib/cue/cueScene.ts:
  Lathe profile + simplex-noise vertex displacement + fresnel rim + UnrealBloom + finish pass.
  Three text frames scroll in over a calm verdict cycle (one=cyan), ending on the link.

  HOW TO CAPTURE THE VIDEO:
   1. Open this file in Chrome, full-screen (F11). The 9:16 stage is centered.
   2. Record the stage with the OS recorder (Win+G / ScreenSketch) or OBS, ~12s.
      Capture just the dark vertical card (drag the region to its edges).
   3. Drop the clip into Instagram as a Story. Done. (Loops seamlessly.)
  No build step, no install — Three.js loads from a CDN.
-->
<style>
  :root { --slate:#16181D; --mist:#E7E4DC; --tide:#36C9D6; }
  html,body { margin:0; height:100%; background:#000; overflow:hidden; font-family: 'Inter Tight', system-ui, sans-serif; }
  /* The 9:16 capture stage. 1080x1920 logical, scaled to fit the window height. */
  #stage {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:1080px; height:1920px; background:
      radial-gradient(120% 80% at 50% 18%, #1c1f26 0%, #16181D 46%, #0c0e12 100%);
    overflow:hidden;
  }
  /* fit-to-window without distorting the 9:16 ratio */
  @media (max-aspect-ratio: 1080/1920) { #stage { transform:translate(-50%,-50%) scale(var(--sx)); } }
  #cue { position:absolute; inset:0; width:100%; height:100%; display:block; }

  .ui { position:absolute; inset:0; pointer-events:none; }
  .wordmark {
    position:absolute; top:96px; left:0; right:0; text-align:center;
    font-weight:600; letter-spacing:.34em; font-size:30px; color:var(--mist);
    opacity:.0; animation: fade 1s ease .2s forwards;
  }
  .wordmark b { color:var(--tide); font-weight:600; }

  /* The frames: each is one short line, fading in then out in sequence. */
  .frame {
    position:absolute; left:84px; right:84px; top:1180px;
    font-family:'Fraunces', Georgia, serif; font-weight:300;
    font-size:74px; line-height:1.14; color:var(--mist);
    text-align:center; opacity:0;
  }
  .frame .hot { color:var(--tide); font-style:italic; }

  /* verdict tag that blooms with the droplet */
  .verdict {
    position:absolute; left:0; right:0; top:735px; text-align:center;
    font-family:'Fraunces', Georgia, serif; font-weight:300; font-style:italic;
    font-size:56px; letter-spacing:.02em; color:var(--tide); opacity:0;
    text-shadow:0 0 38px rgba(54,201,214,.55);
  }

  .link {
    position:absolute; left:0; right:0; bottom:150px; text-align:center; opacity:0;
  }
  .link .pill {
    display:inline-block; padding:26px 54px; border:2px solid var(--tide);
    border-radius:999px; color:var(--tide); font-weight:500; font-size:40px;
    letter-spacing:.01em; box-shadow:0 0 44px rgba(54,201,214,.35);
  }
  .link .url { display:block; margin-top:26px; color:#9aa0a6; font-size:30px; letter-spacing:.06em; }

  @keyframes fade { to { opacity:1; } }
  /* 12s loop. Frame timings (in %): f1 6-30, f2 33-60, f3 63-82, link 84-100. */
  @keyframes f1 { 0%,4%{opacity:0; transform:translateY(26px);} 8%,26%{opacity:1; transform:translateY(0);} 31%,100%{opacity:0; transform:translateY(-20px);} }
  @keyframes f2 { 0%,31%{opacity:0; transform:translateY(26px);} 35%,56%{opacity:1; transform:translateY(0);} 61%,100%{opacity:0; transform:translateY(-20px);} }
  @keyframes f3 { 0%,61%{opacity:0; transform:translateY(26px);} 65%,80%{opacity:1; transform:translateY(0);} 83%,100%{opacity:0; transform:translateY(-20px);} }
  @keyframes vtag { 0%,40%{opacity:0;} 52%,80%{opacity:.92;} 86%,100%{opacity:0;} }
  @keyframes linkin { 0%,82%{opacity:0; transform:translateY(20px);} 88%,100%{opacity:1; transform:translateY(0);} }

  .frame.f1 { animation: f1 12s ease-in-out infinite; }
  .frame.f2 { animation: f2 12s ease-in-out infinite; }
  .frame.f3 { animation: f3 12s ease-in-out infinite; }
  .verdict  { animation: vtag 12s ease-in-out infinite; }
  .link     { animation: linkin 12s ease-in-out infinite; }

  .hint { position:fixed; bottom:10px; left:12px; color:#3a3f47; font-size:13px; font-family:system-ui; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="stage">
    <canvas id="cue"></canvas>
    <div class="ui">
      <div class="wordmark">cue<b>point</b></div>
      <div class="verdict">presque</div>
      <div class="frame f1">Ton son sonne <span class="hot">presque</span>.<br/>Mais y'a un truc qui cloche.</div>
      <div class="frame f2">Balance le track.<br/>Il te dit <span class="hot">le</span> truc à régler<br/>et avec quels plugins.</div>
      <div class="frame f3">Gratuit. Ton audio<br/>bouge pas de ton pc.</div>
      <div class="link">
        <span class="pill">balance ton track</span>
        <span class="url">cuepoint-mu.vercel.app</span>
      </div>
    </div>
  </div>
  <div class="hint">Plein écran (F11) puis enregistre la zone sombre verticale · boucle 12s</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { RectAreaLightUniformsLib } from 'three/addons/lights/RectAreaLightUniformsLib.js';

// fit the 1080x1920 stage to the window height (keeps 9:16)
function fitStage(){
  const s=document.getElementById('stage');
  const sx=Math.min(window.innerWidth/1080, window.innerHeight/1920);
  s.style.setProperty('--sx', sx);
  s.style.transform=`translate(-50%,-50%) scale(${sx})`;
}
fitStage(); addEventListener('resize', fitStage);

const canvas=document.getElementById('cue');
RectAreaLightUniformsLib.init();

const renderer=new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setClearColor(0x000000,0);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.12;
renderer.outputColorSpace=THREE.SRGBColorSpace;

const scene=new THREE.Scene(); scene.background=null;
const camera=new THREE.PerspectiveCamera(32, 1080/1920, 0.1, 100);
camera.position.set(0,0.35,9.2); camera.lookAt(0,0.2,0);

const pmrem=new THREE.PMREMGenerator(renderer);
scene.environment=pmrem.fromScene(new RoomEnvironment(),0.03).texture;

const key=new THREE.RectAreaLight(0xffffff,5.0,7,9); key.position.set(-5,5,5); key.lookAt(0,0,0); scene.add(key);
const fill=new THREE.RectAreaLight(0xdfeef5,2.4,8,8); fill.position.set(6,1,4); fill.lookAt(0,0,0); scene.add(fill);
const rimC=new THREE.RectAreaLight(0x2FCDE6,5.6,4,7); rimC.position.set(4.5,2,-5); rimC.lookAt(0,0,0); scene.add(rimC);
const rimM=new THREE.RectAreaLight(0xF73CB0,1.0,4,6); rimM.position.set(-4.5,-1,-5); rimM.lookAt(0,0,0); scene.add(rimM);
const rimL=new THREE.RectAreaLight(0xC9F23C,1.2,3,5); rimL.position.set(0,-3.5,-4.5); rimL.lookAt(0,0,0); scene.add(rimL);
const back=new THREE.RectAreaLight(0xffffff,2.6,6,5); back.position.set(0,4.5,-5); back.lookAt(0,0,0); scene.add(back);
scene.add(new THREE.AmbientLight(0xffffff,0.16));

const prof=[[0.00,-1.30],[0.46,-1.18],[0.80,-0.95],[1.00,-0.55],[1.06,-0.10],[1.00,0.32],[0.82,0.72],[0.56,1.08],[0.31,1.40],[0.12,1.66],[0.00,1.80]];
const dropGeo=new THREE.LatheGeometry(prof.map(p=>new THREE.Vector2(p[0],p[1])),128); dropGeo.computeVertexNormals();

const NOISE_GLSL=`
uniform float uTime; uniform float uAudio; uniform float uReactive;
uniform float uDisp; uniform float uBreath; uniform float uNoiseFreq;
vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1.0/6.0,1.0/3.0); const vec4 D=vec4(0.0,0.5,1.0,2.0);
  vec3 i=floor(v+dot(v,C.yyy)); vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz); vec3 l=1.0-g; vec3 i1=min(g.xyz,l.zxy); vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx; vec3 x2=x0-i2+C.yyy; vec3 x3=x0-D.yyy;
  i=mod289(i); vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
  float n_=0.142857142857; vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.0*floor(p*ns.z*ns.z); vec4 x_=floor(j*ns.z); vec4 y_=floor(j-7.0*x_);
  vec4 x=x_*ns.x+ns.yyyy; vec4 y=y_*ns.x+ns.yyyy; vec4 h=1.0-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy); vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.0+1.0; vec4 s1=floor(b1)*2.0+1.0; vec4 sh=-step(h,vec4(0.0));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy; vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x); vec3 p1=vec3(a0.zw,h.y); vec3 p2=vec3(a1.xy,h.z); vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
  vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0); m=m*m;
  return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}
float cueLife(vec3 p, vec3 n){
  float tt=uTime*0.5;
  float slow=snoise(p*uNoiseFreq+vec3(0.0,tt,0.0));
  float fast=snoise(p*(uNoiseFreq*2.3)+vec3(tt*1.7,0.0,tt));
  float breath=sin(uTime*0.9)*0.5+0.5;
  float base=(slow*0.7+fast*0.3);
  float amp=0.045*uDisp*uBreath;
  float audio=uReactive*uAudio*0.075;
  return base*(amp+audio)+breath*0.010*uBreath;
}`;
const BEGINNORMAL_INJECT=`
  vec3 objectNormal=vec3(normal);
  { float e=0.02; vec3 pp=position;
    float c0=cueLife(pp,objectNormal);
    float cx=cueLife(pp+vec3(e,0.0,0.0),objectNormal);
    float cy=cueLife(pp+vec3(0.0,e,0.0),objectNormal);
    float cz=cueLife(pp+vec3(0.0,0.0,e),objectNormal);
    vec3 grad=vec3(cx-c0,cy-c0,cz-c0)/e;
    objectNormal=normalize(objectNormal-grad*0.8); }`;
const BEGIN_INJECT=`
  vec3 transformed=vec3(position);
  transformed+=normalize(normal)*cueLife(position,normalize(normal));`;
const FRAG_PARS=`uniform vec3 uRimColor; uniform float uRimStrength;`;
const OPAQUE_INJECT=`
  { float fres=pow(1.0-max(dot(normalize(vNormal),normalize(vViewPosition)),0.0),3.0);
    outgoingLight+=uRimColor*fres*uRimStrength; }
  #include <opaque_fragment>`;

const glass=new THREE.MeshPhysicalMaterial({
  color:new THREE.Color('#f2f6f8'), transmission:1.0, thickness:2.4, roughness:0.05, metalness:0.0,
  ior:1.45, clearcoat:1.0, clearcoatRoughness:0.05,
  iridescence:1.0, iridescenceIOR:1.34, iridescenceThicknessRange:[120,680],
  attenuationColor:new THREE.Color('#b6e9f3'), attenuationDistance:4.0,
  specularIntensity:1.0, envMapIntensity:1.3, transparent:true
});
const cueU={
  uTime:{value:0}, uAudio:{value:0}, uReactive:{value:1}, uDisp:{value:0.48},
  uBreath:{value:1.1}, uNoiseFreq:{value:1.7},
  uRimColor:{value:new THREE.Color('#36C9D6')}, uRimStrength:{value:0.70}
};
glass.onBeforeCompile=(sh)=>{
  Object.keys(cueU).forEach(k=>{sh.uniforms[k]=cueU[k];});
  sh.vertexShader=NOISE_GLSL+'\n'+sh.vertexShader
    .replace('#include <beginnormal_vertex>',BEGINNORMAL_INJECT)
    .replace('#include <begin_vertex>',BEGIN_INJECT);
  sh.fragmentShader=FRAG_PARS+'\n'+sh.fragmentShader
    .replace('#include <opaque_fragment>',OPAQUE_INJECT);
};
glass.customProgramCacheKey=()=> 'cueAlive-story';

const group=new THREE.Group();
group.add(new THREE.Mesh(dropGeo,glass));
const coreMat=new THREE.MeshBasicMaterial({color:new THREE.Color('#36C9D6'), transparent:true, opacity:0.5, blending:THREE.AdditiveBlending, depthWrite:false});
const core=new THREE.Mesh(new THREE.SphereGeometry(0.55,32,32),coreMat); core.position.y=-0.15; group.add(core);
group.scale.setScalar(1.18); group.position.y=0.15; scene.add(group);

const shC=document.createElement('canvas'); shC.width=shC.height=256;
const sx2=shC.getContext('2d');
const sg=sx2.createRadialGradient(128,128,8,128,128,128);
sg.addColorStop(0,'rgba(0,0,0,0.55)'); sg.addColorStop(0.6,'rgba(0,0,0,0.18)'); sg.addColorStop(1,'rgba(0,0,0,0)');
sx2.fillStyle=sg; sx2.fillRect(0,0,256,256);
const shadow=new THREE.Mesh(new THREE.PlaneGeometry(4.4,4.4), new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(shC), transparent:true, depthWrite:false}));
shadow.rotation.x=-Math.PI/2; shadow.position.y=-1.62; scene.add(shadow);

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(1,1),0.30,0.85,0.92);
composer.addPass(bloom);
const Finish={
  uniforms:{tDiffuse:{value:null},uTime:{value:0},uAberr:{value:0.0034},uVig:{value:1.18},uGrain:{value:0.05}},
  vertexShader:'varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
  fragmentShader:[
    'uniform sampler2D tDiffuse; uniform float uTime,uAberr,uVig,uGrain; varying vec2 vUv;',
    'void main(){',
    ' vec2 uv=vUv; vec2 c=uv-0.5; float d=length(c); vec2 dir=c/(d+1e-5);',
    ' float off=uAberr*d;',
    ' float r=texture2D(tDiffuse,uv-dir*off).r;',
    ' float g=texture2D(tDiffuse,uv).g;',
    ' float b=texture2D(tDiffuse,uv+dir*off).b;',
    ' vec3 col=vec3(r,g,b);',
    ' col*=1.0-uVig*0.55*pow(d,2.4);',
    ' float n=fract(sin(dot(uv+uTime,vec2(12.9898,78.233)))*43758.5453);',
    ' col+=(n-0.5)*uGrain;',
    ' gl_FragColor=vec4(col,1.0);',
    '}'
  ].join('\n')
};
const finish=new ShaderPass(Finish); finish.renderToScreen=true; composer.addPass(finish);

function size(){ const w=1080,h=1920; renderer.setPixelRatio(Math.min(devicePixelRatio,2)); composer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(w,h,false); composer.setSize(w,h); }
size();

const clock=new THREE.Clock();
function tick(){
  const t=clock.getElapsedTime();
  cueU.uTime.value=t;
  // a gentle synthetic envelope so the surface breathes/ripples like during analysis
  cueU.uAudio.value=0.45+0.35*Math.sin(t*1.6)+0.18*Math.sin(t*3.7);
  coreMat.opacity=0.42+0.12*Math.sin(t*2.0);
  group.position.y=0.15+Math.sin(t*0.6)*0.06;
  group.rotation.y+=0.0016;
  finish.uniforms.uTime.value=t;
  composer.render();
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
